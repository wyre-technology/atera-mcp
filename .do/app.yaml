name: atera-mcp
region: nyc

services:
  - name: atera-mcp
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      # GitHub PAT (read:packages) used at build time to install the private
      # @wyre-technology/* dependency from GitHub Packages. Passed to the
      # Dockerfile's `ARG GITHUB_TOKEN`. Set this as an encrypted SECRET in the
      # App Platform UI before the first deploy, or the build fails with npm 401.
      - key: GITHUB_TOKEN
        scope: BUILD_TIME
        type: SECRET
      - key: ATERA_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MCP_TRANSPORT
        scope: RUN_TIME
        value: http
      - key: AUTH_MODE
        scope: RUN_TIME
        value: env
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: info
      - key: LOG_FORMAT
        scope: RUN_TIME
        value: json
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
