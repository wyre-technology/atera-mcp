# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - ateraApiKey
    properties:
      ateraApiKey:
        type: string
        description: Your Atera API key
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { ATERA_API_KEY: config.ateraApiKey, MCP_TRANSPORT: 'stdio' } })
